<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SitePilot</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <section class="hero-card">
      <span class="badge">AI Website Scanner</span>
      <h1>SitePilot</h1>
      <p class="subtext">
        Scan any website and get instant AI feedback for SEO, clarity, UX, and conversion improvements.
      </p>

      <div class="scan-box">
        <input id="urlInput" type="text" placeholder="https://example.com" />
        <button id="scanBtn">Scan Website</button>
      </div>

      <div id="status"></div>
      <div id="result" class="result"></div>

      <div id="historyBox" style="margin-top:24px;"></div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>

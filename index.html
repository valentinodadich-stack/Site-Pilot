<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SitePilot</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/sitepilot-results.css" />
</head>
<body>
  <main class="container">
    <section class="hero-card">
      <span class="badge">AI Website Scanner</span>
      <h1>SitePilot</h1>
      <p class="subtext">
        Scan any website and get instant AI feedback for SEO, clarity, UX, and conversion improvements.
      </p>

      <div class="scan-box">
        <input id="urlInput" type="text" placeholder="https://example.com" />
        <button id="scanBtn">Scan Website</button>
      </div>

      <div id="status"></div>
      <div id="result" class="result"></div>
      <div id="historyBox" style="margin-top:24px;"></div>
    </section>
  </main>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
    integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script src="/sitepilot-results.js"></script>
  <script src="/script.js"></script>
</body>
</html>
